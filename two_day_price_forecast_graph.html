        if (!originalLabels.length || !originalDatasets.length) {
            document.getElementById('error').innerText = 'Error: No data available to display';
            throw new Error('No data available');
        }

        const dates = originalLabels.map(date => new Date(date));
        const maxDate = new Date(Math.max(...dates));
        const minDate = new Date(Math.min(...dates));

        let currentFilter = 'all';
        let customDateFrom = null;
        let customDateTo = null;

        document.getElementById('dateFrom').value = minDate.toISOString().split('T')[0];

        const nightTimePlugin = {
            id: 'nightTimeBackground',
            beforeDraw: (chart) => {
                const ctx = chart.ctx;
                const chartArea = chart.chartArea;
                const xAxis = chart.scales.x;

                if (!chartArea || !xAxis) return;

                const isNightTime = (date) => {
                    const hour = date.getHours();
                    return hour >= 21 || hour < 5;
                };

                const visibleData = [];

                for (let i = 0; i < chart.data.labels.length; i++) {
                    visibleData.push({
                        date: new Date(chart.data.labels[i]),
                        x: xAxis.getPixelForValue(new Date(chart.data.labels[i]))
                    });
                }

                if (visibleData.length > 1) {
                    let isInNightZone = false;
                    let startX = null;

                    for (let i = 0; i < visibleData.length; i++) {
                        const currentIsNight = isNightTime(visibleData[i].date);

                        if (currentIsNight && !isInNightZone) {
                            isInNightZone = true;
                            startX = visibleData[i].x;
                        }

                        if ((!currentIsNight && isInNightZone) || (currentIsNight && isInNightZone && i === visibleData.length - 1)) {
                            isInNightZone = false;
                            const endX = i === visibleData.length - 1 ? chartArea.right : visibleData[i].x;

                            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
                            ctx.fillRect(startX, chartArea.top, endX - startX, chartArea.bottom - chartArea.top);
                        }
                    }
                }
            }
        };

        const negativeAreaPlugin = {
            id: 'negativeAreaBackground',
            beforeDraw: (chart) => {
                const ctx = chart.ctx;
                const chartArea = chart.chartArea;
                const yAxis = chart.scales.y;

                if (!chartArea || !yAxis) return;

                const zeroLineY = yAxis.getPixelForValue(0);

                if (zeroLineY >= chartArea.top && zeroLineY <= chartArea.bottom) {
                    ctx.fillStyle = 'rgba(255, 0, 0, 0.1)';
                    ctx.fillRect(
                        chartArea.left,
                        zeroLineY,
                        chartArea.right - chartArea.left,
                        chartArea.bottom - zeroLineY
                    );
                }
            }
        };

        const colors = [
            '#0056b3B3',
            '#ffa831',
            '#82cdb1',
            '#f5c0ee',
            '#A674B0'
        ];

        try {
            const ctx = document.getElementById('myChart').getContext('2d');

            const chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: originalLabels,
                    datasets: originalDatasets.map((ds, index) => ({
                        label: ds.label,
                        data: ds.data,
                        borderColor: colors[index % colors.length],
                        borderWidth: 2.4,
                        pointRadius: 0,
                        fill: false,
                        tension: 0.1,
                        spanGaps: true
                    }))
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: false,
                    interaction: {
                        mode: 'nearest',
                        intersect: false,
                        axis: 'x'
                    },
                    plugins: {
                        tooltip: {
                            enabled: true,
                            position: 'nearest',
                            yAlign: 'top',
                            xAlign: 'center',
                            caretPadding: 16,
                            backgroundColor: 'rgba(0, 0, 0, 0.56)',
                            callbacks: {
                                title: function(tooltipItems) {
                                    return moment(tooltipItems[0].label).format('MMM D, YYYY HH:mm');
                                },
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    if (label) label += ': ';
                                    label += context.parsed.y;
                                    return label;
                                }
                            }
                        },
                        annotation: {
                            annotations: {
                                endLine: {
                                    type: 'line',
                                    xMin: maxDate,
                                    xMax: maxDate,
                                    borderColor: '#808080',
                                    borderWidth: 2,
                                    label: { enabled: false }
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            title: { display: true, text: 'Energy Price' },
                            grid: { color: '#cccccc', drawOnChartArea: true }
                        },
                        x: {
                            type: 'time',
                            time: {
                                unit: 'hour',
                                displayFormats: { hour: 'MMM D, HH:mm' }
                            },
                            title: { display: true, text: 'Date/Time' },
                            grid: { display: false }
                        }
                    }
                },
                plugins: [nightTimePlugin, negativeAreaPlugin]
            });

            function filterData(period) {
                currentFilter = period;
                customDateFrom = null;
                customDateTo = null;

                const dateFromInput = document.getElementById('dateFrom');
                let newDateFrom;

                switch(period) {
                    case '30days':
                        newDateFrom = new Date(maxDate - 30 * 24 * 60 * 60 * 1000);
                        break;
                    case '7days':
                        newDateFrom = new Date(maxDate - 7 * 24 * 60 * 60 * 1000);
                        break;
                    case '48hours':
                        newDateFrom = new Date(maxDate - 48 * 60 * 60 * 1000);
                        break;
                    case 'all':
                    default:
                        newDateFrom = minDate;
                        break;
                }

                dateFromInput.value = newDateFrom.toISOString().split('T')[0];
                document.getElementById('dateTo').value = maxDate.toISOString().split('T')[0];

                updateChart();
            }

            function updateDateRange() {
                const fromInput = document.getElementById('dateFrom').value;
                const toInput = document.getElementById('dateTo').value;

                if (fromInput && toInput) {
                    customDateFrom = new Date(fromInput + 'T00:00:00');
                    customDateTo = new Date(toInput + 'T23:00:00');
                    currentFilter = 'custom';
                    updateChart();
                }
            }

            function updateChart() {
                let filteredLabels = [...originalLabels];
                let filteredDatasets = originalDatasets.map(ds => [...ds.data]);

                let minFilteredDate = minDate;
                let maxFilteredDate = maxDate;

                if (currentFilter === 'custom' && customDateFrom && customDateTo) {
                    const filteredIndices = dates
                        .map((date, index) => date >= customDateFrom && date <= customDateTo ? index : -1)
                        .filter(index => index !== -1);

                    filteredLabels = filteredIndices.map(i => originalLabels[i]);
                    filteredDatasets = originalDatasets.map(ds =>
                        filteredIndices.map(i => ds.data[i])
                    );

                    if (filteredLabels.length > 0) {
                        minFilteredDate = new Date(filteredLabels[0]);
                        maxFilteredDate = new Date(filteredLabels[filteredLabels.length - 1]);
                    }
                } else if (currentFilter !== 'all') {
                    let cutoffDate;

                    switch(currentFilter) {
                        case '30days':
                            cutoffDate = new Date(maxDate - 30 * 24 * 60 * 60 * 1000);
                            break;
                        case '7days':
                            cutoffDate = new Date(maxDate - 7 * 24 * 60 * 60 * 1000);
                            break;
                        case '48hours':
                            cutoffDate = new Date(maxDate - 48 * 60 * 60 * 1000);
                            break;
                    }

                    const filteredIndices = dates
                        .map((date, index) => date >= cutoffDate ? index : -1)
                        .filter(index => index !== -1);

                    filteredLabels = filteredIndices.map(i => originalLabels[i]);
                    filteredDatasets = originalDatasets.map(ds =>
                        filteredIndices.map(i => ds.data[i])
                    );

                    if (filteredLabels.length > 0) {
                        minFilteredDate = new Date(filteredLabels[0]);
                        maxFilteredDate = new Date(filteredLabels[filteredLabels.length - 1]);
                    }
                }

                chart.data.labels = filteredLabels;

                chart.data.datasets.forEach((dataset, index) => {
                    dataset.data = filteredDatasets[index];
                });

                chart.options.scales.x.min = minFilteredDate;
                chart.options.scales.x.max = maxFilteredDate;

                if (filteredLabels.length > 0) {
                    chart.options.plugins.annotation.annotations.endLine.xMin = maxFilteredDate;
                    chart.options.plugins.annotation.annotations.endLine.xMax = maxFilteredDate;
                }

                chart.update('none');
            }

            filterData('7days');

        } catch (error) {
            document.getElementById('error').innerText = 'Error rendering chart: ' + error.message;
            console.error(error);
        }
